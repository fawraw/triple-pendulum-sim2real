name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install OS deps for headless MuJoCo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1 libglu1-mesa libosmesa6 libegl1 libglfw3

      - name: Install Python deps (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2"
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          MUJOCO_GL: osmesa
        run: pytest

      - name: Env import + reset/step smoke
        env:
          MUJOCO_GL: osmesa
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, '.')
          from sim.envs.triple_pendulum_env import TriplePendulumEnv
          import numpy as np
          env = TriplePendulumEnv(target_ep=7, init_mode='near_target',
                                  init_noise=0.05, max_episode_steps=50)
          obs, _ = env.reset(seed=0)
          assert obs.shape == (16,), obs.shape
          for _ in range(50):
              obs, r, term, trunc, _ = env.step(env.action_space.sample())
          print('env smoke OK')
          PY

      - name: TQC tiny training (200 steps)
        env:
          MUJOCO_GL: osmesa
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, '.')
          from stable_baselines3.common.monitor import Monitor
          from stable_baselines3.common.vec_env import DummyVecEnv
          from sb3_contrib import TQC
          from sim.envs.triple_pendulum_env import TriplePendulumEnv
          env = DummyVecEnv([lambda: Monitor(TriplePendulumEnv(target_ep=7,
                                                              init_mode='near_target',
                                                              max_episode_steps=50))])
          m = TQC('MlpPolicy', env, learning_starts=50, buffer_size=500, batch_size=32,
                  policy_kwargs=dict(net_arch=[32,32], n_critics=2, n_quantiles=10),
                  top_quantiles_to_drop_per_net=2, verbose=0)
          m.learn(total_timesteps=200)
          print('tqc smoke OK')
          PY
