# Smoke test config for RunPod bootstrap validation.
# Tiny budget (10K steps) so it completes quickly. Specifically uses
# target_mode=weighted to trigger the validation fix in dae49d3.

stage: SMOKE

env:
  target_mode: weighted          # tests dae49d3 validation
  hard_ep_weight: 3.0
  max_episode_steps: 1000
  init_mode: near_target
  init_noise: 0.05
  fall_grace_steps: 20

algo: TQC
total_timesteps: 10_000          # ~3 min on A5000
n_envs: 4

tqc:
  policy: MlpPolicy
  learning_rate: 3.0e-4
  buffer_size: 100_000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 4
  top_quantiles_to_drop_per_net: 2
  policy_kwargs:
    net_arch: [256, 256]
    n_critics: 3
    n_quantiles: 25

callbacks:
  rollout_log_freq: 2_000
  checkpoint_freq:  5_000

eval:
  freq: 5_000
  n_episodes: 8
  deterministic: true
  final_n_episodes: 16           # small final eval (2 per EP)
