# Milestone 4: 56-transition policy (any EP → any EP).
# Warm-starts from the best M3b/M3c checkpoint — set pretrained_policy below.
# Observation is 16-dim: joint_state(8) + target_ep_onehot(8). There is NO
# source-EP one-hot; the policy infers the current state from the joint angles.
# target_mode: "transition" matches per_transition_eval (which always evals in
# transition mode): each reset samples a (start, target) pair and inits near
# the start equilibrium, so the training and eval distributions agree.
# NOTE: set pretrained_policy to the path of the best M3b or M3c final.zip before launching.

stage: M4

pretrained_policy: null   # e.g. checkpoints/m3b_all_eps_<run>/final.zip

env:
  target_ep: 7              # ignored when target_mode == "transition"
  target_mode: transition   # sample (start, target) pairs; matches the eval
  init_mode: near_target    # init around the sampled start equilibrium
  init_noise: 0.05
  max_episode_steps: 2000   # longer budget for swing-up transitions

algo: TQC
seed: 0                    # fixed for reproducibility (logged to MLflow)
total_timesteps: 5_000_000
n_envs: 8                  # parallel envs (SubprocVecEnv)

tqc:
  policy: MlpPolicy
  learning_rate: 1.0e-4
  buffer_size: 2_000_000
  batch_size: 1024         # GPU-friendly; reduce to 512 if VRAM limited
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 8           # = n_envs to preserve grad density
  top_quantiles_to_drop_per_net: 2
  policy_kwargs:
    net_arch: [512, 512]
    n_critics: 5
    n_quantiles: 25

callbacks:
  rollout_log_freq: 10_000
  checkpoint_freq:  500_000

eval:
  freq:            100_000
  n_episodes:      56        # one episode per transition
  deterministic:   true
  final_n_episodes: 280      # 5 per transition × 56 = 280
